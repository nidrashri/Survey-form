<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Survey Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 id="title">Student Survey Form</h1>

    <p id="description">
        Thank you for taking the time to complete this survey.
    </p>

    <form id="survey-form">

        <!-- Name -->
        <label id="name-label" for="name">Name</label>
        <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
        >

        <!-- Email -->
        <label id="email-label" for="email">Email</label>
        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
        >

        <!-- Number -->
        <label id="number-label" for="number">Age</label>
        <input
            type="number"
            id="number"
            min="10"
            max="100"
            placeholder="Enter your age"
        >

        <!-- Dropdown -->
        <label for="dropdown">Current Role</label>
        <select id="dropdown">
            <option value="">Select an option</option>
            <option value="student">Student</option>
            <option value="developer">Developer</option>
            <option value="other">Other</option>
        </select>

        <!-- Radio Buttons -->
        <p>Would you recommend coding to others?</p>

        <label>
            <input
                type="radio"
                name="recommend"
                value="yes"
            > Yes
        </label>

        <label>
            <input
                type="radio"
                name="recommend"
                value="no"
            > No
        </label>

        <!-- Checkboxes -->
        <p>Technologies you like:</p>

        <label>
            <input
                type="checkbox"
                value="html"
            > HTML
        </label>

        <label>
            <input
                type="checkbox"
                value="css"
            > CSS
        </label>

        <label>
            <input
                type="checkbox"
                value="javascript"
            > JavaScript
        </label>

        <!-- Textarea -->
        <p>Additional Comments</p>

        <textarea
            rows="5"
            placeholder="Write your comments here..."
        ></textarea>

        <!-- Submit Button -->
        <button id="submit" type="submit">
            Submit
        </button>

    </form>

</body>
</html>
